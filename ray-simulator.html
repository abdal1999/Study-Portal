<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Class 10 Physics Practical Lab</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0a0a0a, #121212);
  color: #fff;
  user-select: none;
}

/* HEADER */
header {
  background: rgba(20,20,20,0.9);
  backdrop-filter: blur(8px);
  padding: 14px;
  text-align: center;
  font-size: 22px;
  font-weight: 600;
  border-bottom: 1px solid #2a2a2a;
}

/* TOPBAR */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 15px;
  background: rgba(15,15,15,0.9);
  backdrop-filter: blur(10px);
  flex-wrap: wrap;
  border-bottom: 1px solid #2a2a2a;
}

.topbar button, select {
  padding: 8px 14px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  transition: 0.3s;
}

.back-btn {
  background: linear-gradient(45deg, #ff4d4d, #ff1a1a);
  color: white;
}
.back-btn:hover {
  transform: scale(1.05);
}

.focus-btn {
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  color: white;
}
.focus-btn:hover {
  transform: scale(1.05);
}

select {
  background: #1c1c1c;
  color: white;
}

/* LAYOUT */
.container {
  display: flex;
}

/* INSTRUCTIONS */
.instructions {
  width: 100px;
  background: rgba(20,20,20,0.85);
  backdrop-filter: blur(10px);
  padding: 10px;
  border-right: 1px solid #2a2a2a;
  font-size: 12px;
}

.instructions h3 {
  font-size: 13px;
  margin-bottom: 8px;
}

.instructions ul {
  padding-left: 14px;
}

.instructions li {
  margin-bottom: 6px;
  line-height: 1.3;
}

/* SIMULATOR */
.simulator {
  flex: 1;
}

iframe {
  width: 100%;
  height: 90vh;
  border: none;
  user-select: auto;
}

/* EXIT BUTTON */
.exit-btn {
  display: none;
  position: fixed;
  top: 15px;
  right: 15px;
  background: red;
  color: white;
  border: none;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  z-index: 999;
}

/* FOOTER */
footer {
  background: rgba(20,20,20,0.9);
  backdrop-filter: blur(8px);
  text-align: center;
  padding: 10px;
  border-top: 1px solid #2a2a2a;
}

/* WATERMARK */
.watermark {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-30deg);
  font-size: 40px;
  color: rgba(255,255,255,0.05);
  pointer-events: none;
  z-index: 999;
}

/* DEVTOOLS BLUR */
.blur {
  filter: blur(8px);
  pointer-events: none;
}

/* MOBILE */
@media(max-width: 768px) {
  .container {
    flex-direction: column;
  }

  .instructions {
    width: 100%;
    border-right: none;
    border-bottom: 1px solid #2a2a2a;
  }

  iframe {
    height: 75vh;
  }
}
</style>
</head>

<body>

<div class="watermark">Study Portal • Class 10</div>

<header>
  🔬 Class 10 Physics Practical Lab — Light (Ray Diagrams)
</header>

<div class="topbar">
  <button class="back-btn" onclick="goBack()">⬅ Back</button>

  <select onchange="loadExperiment(this.value)">
    <option value="">Select Experiment</option>
    <option value="concave">Concave Mirror</option>
    <option value="convex">Convex Mirror</option>
    <option value="convexLens">Convex Lens</option>
    <option value="concaveLens">Concave Lens</option>
  </select>

  <button class="focus-btn" onclick="focusMode()">🎯 Focus</button>
</div>

<button class="exit-btn" id="exitBtn" onclick="exitFocus()">❌ Exit</button>

<div class="container">

  <!-- INSTRUCTIONS -->
  <div class="instructions" id="instructions">
    <h3>📘 Guide</h3>
    <ul id="steps">
      <li>Select experiment</li>
      <li>Choose mirror/lens</li>
      <li>Move object</li>
      <li>Observe F & C</li>
      <li>Study ray paths</li>
    </ul>
  </div>

  <!-- SIMULATOR -->
  <div class="simulator">
    <iframe src="https://rajeshs142.github.io/light"></iframe>
  </div>

</div>

<footer>
  © 2026 Study Portal | CBSE Class 10 Practical Learning
</footer>

<script>
// BACK
function goBack() {
  window.location.href = "class10.html";
}

// EXPERIMENT GUIDE
function loadExperiment(type) {
  const steps = document.getElementById("steps");

  if(type === "concave") {
    steps.innerHTML = `
      <li>Concave mirror</li>
      <li>Object beyond C</li>
      <li>Real inverted</li>
      <li>Between F & C</li>
      <li>Magnified image</li>
    `;
  }

  else if(type === "convex") {
    steps.innerHTML = `
      <li>Convex mirror</li>
      <li>Object anywhere</li>
      <li>Virtual erect</li>
      <li>Always smaller</li>
    `;
  }

  else if(type === "convexLens") {
    steps.innerHTML = `
      <li>Convex lens</li>
      <li>Beyond 2F</li>
      <li>Real inverted</li>
      <li>Inside F → virtual</li>
    `;
  }

  else if(type === "concaveLens") {
    steps.innerHTML = `
      <li>Concave lens</li>
      <li>Object anywhere</li>
      <li>Virtual erect</li>
      <li>Diminished</li>
    `;
  }
}

// FOCUS MODE
function focusMode() {
  document.querySelector("header").style.display = "none";
  document.querySelector("footer").style.display = "none";
  document.querySelector(".topbar").style.display = "none";
  document.getElementById("instructions").style.display = "none";

  document.getElementById("exitBtn").style.display = "block";
}

function exitFocus() {
  document.querySelector("header").style.display = "block";
  document.querySelector("footer").style.display = "block";
  document.querySelector(".topbar").style.display = "flex";
  document.getElementById("instructions").style.display = "block";

  document.getElementById("exitBtn").style.display = "none";
}

/* 🔒 PROTECTION */

// Disable right click
document.addEventListener("contextmenu", e => e.preventDefault());

// Disable keys
document.addEventListener("keydown", function(e) {
  if (
    e.ctrlKey && ["c","u","s","a","x","p"].includes(e.key.toLowerCase()) ||
    e.key === "F12"
  ) {
    e.preventDefault();
  }
});

// Disable copy
document.addEventListener("copy", e => e.preventDefault());

// Disable drag
document.addEventListener("dragstart", e => e.preventDefault());

// DevTools detection
let devtoolsOpen = false;
setInterval(() => {
  const widthThreshold = window.outerWidth - window.innerWidth > 160;
  const heightThreshold = window.outerHeight - window.innerHeight > 160;

  if (widthThreshold || heightThreshold) {
    if (!devtoolsOpen) {
      document.body.classList.add("blur");
      devtoolsOpen = true;
    }
  } else {
    document.body.classList.remove("blur");
    devtoolsOpen = false;
  }
}, 1000);
</script>

</body>
</html>
