<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Student Exam Countdown</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
}

/* floating animation */
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
.animate-float {
  animation: float 4s ease-in-out infinite;
}

/* glass effect */
.glass {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(12px);
}

/* button glow */
.glow-btn:hover {
  box-shadow: 0 0 18px rgba(99,102,241,0.5);
}

/* FIX: better mobile alignment */
@media (max-width: 640px) {
  .input-row {
    flex-direction: column;
  }

  .input-row input,
  .input-row button {
    width: 100%;
  }
}
</style>
</head>

<body class="bg-gradient-to-br from-indigo-50 via-sky-100 to-pink-100 min-h-screen flex items-center justify-center p-3">

<div class="w-full max-w-3xl animate-float">

  <div class="glass p-5 md:p-10 rounded-2xl shadow-2xl border border-white">

    <!-- TITLE -->
    <h1 class="text-2xl sm:text-3xl md:text-4xl font-extrabold text-center text-indigo-800 mb-6 md:mb-8">
      📚 Exam Countdown Dashboard
    </h1>

    <!-- BOARD -->
    <div class="mb-6 p-5 rounded-xl bg-white shadow-md border border-blue-100">
      <h2 class="text-lg md:text-xl font-bold text-indigo-700 mb-2">
        🏁 Board Exam (Expected: 15 Feb 2027)
      </h2>

      <div id="boardOutput"
        class="p-4 rounded-lg bg-blue-50 border border-dashed border-blue-300 text-blue-800 text-base md:text-lg">
      </div>
    </div>

    <!-- SCHOOL -->
    <div class="p-5 rounded-xl bg-white shadow-md border border-pink-100">

      <h2 class="text-lg md:text-xl font-bold text-pink-600 mb-4">
        📅 Your School Exam
      </h2>

      <!-- FIXED ROW -->
      <div class="input-row flex gap-3 mb-4">
        <input type="date"
          id="schoolExamDate"
          class="flex-1 p-3 rounded-lg border border-pink-200 focus:ring-2 focus:ring-pink-400 outline-none"/>
        
        <button onclick="calculateSchoolExam()"
          class="px-5 py-3 rounded-lg bg-indigo-600 text-white font-bold glow-btn transition transform hover:scale-105 whitespace-nowrap">
          🎯 Check
        </button>
      </div>

      <div id="schoolOutput"
        class="p-4 rounded-lg bg-pink-50 border border-dashed border-pink-300 text-pink-800 text-base md:text-lg">
      </div>
    </div>

    <!-- FOOTER -->
    <p class="text-center text-gray-500 mt-5 text-sm">
      Made with ❤️ for Super Students
    </p>

  </div>
</div>

<script>
function getMotivation(days) {
  if (days < 0) return "🎉 Exams are over — celebrate!";
  if (days === 0) return "🎯 It's today! Stay calm!";
  if (days <= 5) return "🌟 Final revision time!";
  if (days <= 15) return "📘 Keep pushing!";
  if (days <= 30) return "💡 Stay consistent!";
  if (days <= 100) return "🚀 Start preparing early!";
  return "🧠 Believe in yourself!";
}

function calculateBoardExam() {
  const boardDate = new Date("2027-02-15");
  const today = new Date();

  today.setHours(0,0,0,0);
  boardDate.setHours(0,0,0,0);

  const diffDays = Math.ceil((boardDate - today) / (1000*60*60*24));

  document.getElementById("boardOutput").innerHTML =
    `<p class="font-bold text-lg md:text-xl">${diffDays >= 0 ? diffDays + " days left" : "Exam passed"}</p>
     <p class="mt-1">${getMotivation(diffDays)}</p>`;
}

function calculateSchoolExam() {
  const val = document.getElementById("schoolExamDate").value;
  const out = document.getElementById("schoolOutput");

  if (!val) {
    out.innerHTML = `<p class="text-red-500 font-semibold">Please select a date</p>`;
    return;
  }

  const exam = new Date(val);
  const today = new Date();

  today.setHours(0,0,0,0);
  exam.setHours(0,0,0,0);

  const diffDays = Math.ceil((exam - today)/(1000*60*60*24));

  out.innerHTML =
    `<p class="font-bold text-lg md:text-xl">${diffDays >= 0 ? diffDays + " days left" : "Date passed"}</p>
     <p class="mt-1">${getMotivation(diffDays)}</p>`;
}

calculateBoardExam();
</script>

</body>
</html>
